spring:
  application:
    name: medical-appointment-system
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medical_appointment}
    username: ${DB_USERNAME:medical_appointment}
    password: ${DB_PASSWORD:medical_appointment}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/medical-appointment}
      client:
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/medical-appointment}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            provider: keycloak
            client-id: ${OAUTH2_CLIENT_ID:medical-appointment-local}
            client-authentication-method: none
            authorization-grant-type: authorization_code
            scope: openid,profile,email
  jooq:
    sql-dialect: postgres

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    public-docs-enabled: ${PUBLIC_DOCS_ENABLED:true}
