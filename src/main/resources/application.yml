spring:
  application:
    name: medical-appointment-system
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medical_appointment}
    username: ${DB_USERNAME:medical_appointment}
    password: ${DB_PASSWORD:medical_appointment}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/medical-appointment}
      client:
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/medical-appointment}
            user-name-attribute: preferred_username
        registration:
          public:
            provider: keycloak
            client-id: ${OAUTH2_PUBLIC_CLIENT_ID:medical-appointment-public}
            client-authentication-method: none
            authorization-grant-type: authorization_code
            scope: openid,profile,email
          internal:
            provider: keycloak
            client-id: ${OAUTH2_INTERNAL_CLIENT_ID:medical-appointment-internal}
            client-authentication-method: none
            authorization-grant-type: authorization_code
            scope: openid,profile,email
  jooq:
    sql-dialect: postgres

server:
  port: ${SERVER_PORT:8080}

app:
  deployment:
    profile: ${DEPLOYMENT_PROFILE:local}
    endpoints:
      public-base-url: ${APP_PUBLIC_URL:http://public.localhost:8080}
      internal-base-url: ${APP_INTERNAL_URL:http://internal.localhost:8080}
      auth-base-url: ${APP_AUTH_URL:http://auth.localhost:8080}
    operations:
      require-secure-cookies: ${REQUIRE_SECURE_COOKIES:false}
      expose-diagnostics: ${EXPOSE_DIAGNOSTICS:false}
  identity:
    mode: ${IDENTITY_MODE:LOCAL}
    urls:
      public-url: ${APP_PUBLIC_URL:http://localhost:8080}
      internal-url: ${APP_INTERNAL_URL:http://localhost:8080}
    clients:
      public: ${OAUTH2_PUBLIC_CLIENT_ID:medical-appointment-public}
      internal-client-id: ${OAUTH2_INTERNAL_CLIENT_ID:medical-appointment-internal}
  security:
    public-docs-enabled: ${PUBLIC_DOCS_ENABLED:true}
