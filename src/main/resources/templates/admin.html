<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Администрирование</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>
  <body>
    <header th:replace="~{fragments :: topbar}"></header>
    <main class="page">
      <div class="page-title"><h1>Администрирование</h1></div>
      <div th:replace="~{fragments :: notices}"></div>

      <div class="grid">
        <section class="panel span-4">
          <div class="panel-header"><h2>Специализация</h2></div>
          <div class="panel-body">
            <form class="stack" th:action="@{/admin/specializations}" method="post">
              <div class="field">
                <label for="specializationName">Название</label>
                <input id="specializationName" name="name" required />
              </div>
              <div class="field">
                <label for="specializationDescription">Описание</label>
                <textarea id="specializationDescription" name="description"></textarea>
              </div>
              <button class="button primary" type="submit">Добавить</button>
            </form>
          </div>
        </section>

        <section class="panel span-4">
          <div class="panel-header"><h2>Врач</h2></div>
          <div class="panel-body">
            <form class="stack" th:action="@{/admin/doctors}" method="post">
              <div class="field">
                <label for="doctorSpecializationId">Специализация</label>
                <select id="doctorSpecializationId" name="specializationId" required>
                  <option value="">Выберите</option>
                  <option
                    th:each="specialization : ${specializations}"
                    th:value="${specialization.id}"
                    th:text="${specialization.name}"
                  ></option>
                </select>
              </div>
              <div class="field">
                <label for="doctorFullName">ФИО</label>
                <input id="doctorFullName" name="fullName" required />
              </div>
              <div class="field">
                <label for="cabinet">Кабинет</label>
                <input id="cabinet" name="cabinet" />
              </div>
              <button class="button primary" type="submit">Добавить</button>
            </form>
          </div>
        </section>

        <section class="panel span-4">
          <div class="panel-header"><h2>Слот</h2></div>
          <div class="panel-body">
            <form class="stack" th:action="@{/admin/slots}" method="post">
              <div class="field">
                <label for="slotDoctorId">Врач</label>
                <select id="slotDoctorId" name="doctorId" required>
                  <option value="">Выберите</option>
                  <option th:each="doctor : ${doctors}" th:value="${doctor.id}" th:text="${doctor.fullName}"></option>
                </select>
              </div>
              <div class="field">
                <label for="startTime">Начало</label>
                <input id="startTime" name="startTime" type="datetime-local" required />
              </div>
              <div class="field">
                <label for="durationMinutes">Длительность, мин</label>
                <input id="durationMinutes" name="durationMinutes" type="number" min="5" step="5" value="30" required />
              </div>
              <button class="button primary" type="submit">Добавить</button>
            </form>
          </div>
        </section>

        <section class="panel span-5">
          <div class="panel-header"><h2>Врачи</h2></div>
          <div th:if="${#lists.isEmpty(doctors)}" class="empty">Врачей нет</div>
          <table th:if="${!#lists.isEmpty(doctors)}">
            <thead>
              <tr>
                <th>ФИО</th>
                <th>Кабинет</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="doctor : ${doctors}">
                <td th:text="${doctor.fullName}"></td>
                <td th:text="${doctor.cabinet ?: '-'}"></td>
                <td><a class="button" th:href="@{/admin(doctorId=${doctor.id})}">Слоты</a></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="panel span-7">
          <div class="panel-header"><h2>Расписание</h2></div>
          <div th:if="${selectedDoctorId == null}" class="empty">Выберите врача</div>
          <div th:if="${selectedDoctorId != null and #lists.isEmpty(slots)}" class="empty">Слотов нет</div>
          <table th:if="${selectedDoctorId != null and !#lists.isEmpty(slots)}">
            <thead>
              <tr>
                <th>Начало</th>
                <th>Окончание</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="slot : ${slots}">
                <td th:text="${#temporals.format(slot.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(slot.endTime, 'HH:mm')}"></td>
                <td><span class="pill" th:text="${labels.slotStatus(slot.status)}"></span></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="panel span-12">
          <div class="panel-header"><h2>Записи</h2></div>
          <div th:if="${#lists.isEmpty(appointments)}" class="empty">Записей нет</div>
          <table th:if="${!#lists.isEmpty(appointments)}">
            <thead>
              <tr>
                <th>Пациент</th>
                <th>Врач</th>
                <th>Время</th>
                <th>Статус</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="appointment : ${appointments}">
                <td th:text="${appointment.patientFullName}"></td>
                <td th:text="${appointment.doctorFullName}"></td>
                <td th:text="${#temporals.format(appointment.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td><span class="pill" th:text="${labels.appointmentStatus(appointment.status)}"></span></td>
                <td>
                  <form class="actions" th:action="@{/admin/appointments/status}" method="post">
                    <input type="hidden" name="appointmentId" th:value="${appointment.id}" />
                    <select name="status">
                      <option value="CREATED" th:selected="${appointment.status.name() == 'CREATED'}">Создана</option>
                      <option value="COMPLETED" th:selected="${appointment.status.name() == 'COMPLETED'}">Завершена</option>
                      <option value="CANCELLED" th:selected="${appointment.status.name() == 'CANCELLED'}">Отменена</option>
                    </select>
                    <input name="cancelReason" placeholder="Причина отмены" />
                    <button class="button" type="submit">Сохранить</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
  </body>
</html>
