<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистратура</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>
  <body>
    <header th:replace="~{fragments :: topbar}"></header>
    <main class="page">
      <div class="page-title">
        <div>
          <h1>Регистратура</h1>
          <p class="muted">Быстрый поиск пациента, подбор врача и запись на свободный слот.</p>
        </div>
      </div>
      <div th:replace="~{fragments :: notices}"></div>

      <div class="grid">
        <section class="panel span-5">
          <div class="panel-header"><h2>Новый пациент</h2></div>
          <div class="panel-body">
            <form class="fields" th:action="@{/internal/registry/patients}" method="post">
              <div class="field full">
                <label for="fullName">ФИО</label>
                <input id="fullName" name="fullName" required />
              </div>
              <div class="field">
                <label for="birthDate">Дата рождения</label>
                <input id="birthDate" name="birthDate" type="date" required />
              </div>
              <div class="field">
                <label for="phone">Телефон</label>
                <input id="phone" name="phone" inputmode="tel" placeholder="+7 900 000-00-00" required />
              </div>
              <div class="field full">
                <label for="policyNumber">Полис</label>
                <input id="policyNumber" name="policyNumber" placeholder="Необязательно" />
              </div>
              <div class="field full">
                <button class="button primary" type="submit">Добавить пациента</button>
              </div>
            </form>
          </div>
        </section>

        <section class="panel span-7">
          <div class="panel-header"><h2>Запись на прием</h2></div>
          <div class="panel-body stack">
            <form class="fields compact-form" th:action="@{/internal/registry}" method="get">
              <input type="hidden" name="patientId" th:value="${selectedPatientId}" />
              <div class="field">
                <label for="doctorIdFilter">Врач</label>
                <select id="doctorIdFilter" name="doctorId" onchange="this.form.submit()">
                  <option value="">Выберите врача</option>
                  <option
                    th:each="doctor : ${doctors}"
                    th:value="${doctor.id}"
                    th:selected="${doctor.id == selectedDoctorId}"
                    th:text="${doctor.fullName}"
                  ></option>
                </select>
              </div>
            </form>

            <form class="fields compact-form" th:action="@{/internal/registry}" method="get">
              <input type="hidden" name="doctorId" th:value="${selectedDoctorId}" />
              <div class="field full">
                <label for="patientQuery">Поиск пациента</label>
                <input
                  id="patientQuery"
                  name="patientQuery"
                  placeholder="ФИО, телефон или полис"
                  th:value="${patientQuery}"
                />
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <button class="button" type="submit">Найти</button>
              </div>
            </form>

            <div class="summary-strip">
              <span th:text="${selectedDoctorId == null ? 'Врач не выбран' : 'Врач выбран'}"></span>
              <span th:text="${selectedPatientId == null ? 'Пациент не выбран' : 'Пациент выбран'}"></span>
              <span th:text="${slots == null ? 'Слоты появятся после выбора врача' : 'Свободных слотов: ' + #lists.size(slots)}"></span>
            </div>

            <form class="fields" th:if="${selectedDoctorId != null}" th:action="@{/internal/registry/appointments}" method="post">
              <input type="hidden" name="doctorId" th:value="${selectedDoctorId}" />
              <div class="field">
                <label for="patientId">Пациент</label>
                <select id="patientId" name="patientId" required>
                  <option value="">Выберите пациента</option>
                  <option
                    th:each="patient : ${patients}"
                    th:value="${patient.id}"
                    th:selected="${patient.id == selectedPatientId}"
                    th:text="${patient.fullName + ' · ' + patient.phone}"
                  ></option>
                </select>
              </div>
              <div class="field">
                <label for="slotId">Слот</label>
                <select id="slotId" name="slotId" required>
                  <option value="">Выберите время</option>
                  <option
                    th:each="slot : ${slots}"
                    th:value="${slot.id}"
                    th:text="${#temporals.format(slot.startTime, 'dd.MM.yyyy HH:mm')}"
                  ></option>
                </select>
              </div>
              <div class="field full">
                <button class="button primary" type="submit">Записать пациента</button>
              </div>
            </form>
            <div class="empty compact" th:if="${selectedDoctorId == null}">
              Выберите врача, чтобы увидеть свободное время для записи.
            </div>
          </div>
        </section>

        <section class="panel span-12">
          <div class="panel-header"><h2>Последние записи</h2></div>
          <div th:if="${#lists.isEmpty(appointments)}" class="empty">Записей нет</div>
          <table th:if="${!#lists.isEmpty(appointments)}">
            <thead>
              <tr>
                <th>Пациент</th>
                <th>Врач</th>
                <th>Время</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="appointment : ${appointments}">
                <td th:text="${appointment.patientFullName}"></td>
                <td th:text="${appointment.doctorFullName}"></td>
                <td th:text="${#temporals.format(appointment.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td><span class="pill" th:text="${labels.appointmentStatus(appointment.status)}"></span></td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
  </body>
</html>
