<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
  <body>
    <header th:fragment="topbar" class="topbar">
      <div class="brand">Система записи на прием</div>
      <nav class="nav">
        <a th:href="@{/}">Главная</a>
        <a th:href="@{/booking}">Запись</a>
        <a th:href="@{/account}" th:if="${authenticated}">Кабинет</a>
        <a th:href="@{/internal/doctor}" th:if="${doctor}">Приемы врача</a>
        <a th:href="@{/internal/registry}" th:if="${registrar}">Регистратура</a>
        <a th:href="@{/internal/appointments}" th:if="${registrar}">Записи</a>
        <a th:href="@{/admin}" th:if="${chiefDoctor}">Администрирование</a>
      </nav>
      <div class="nav">
        <span class="user" th:if="${authenticated}" th:text="${username}">user</span>
        <a th:if="${!authenticated}" th:href="@{/oauth2/authorization/public}">Войти</a>
        <form th:if="${authenticated}" th:action="@{/logout}" method="post">
          <button type="submit">Выйти</button>
        </form>
      </div>
    </header>

    <div th:fragment="notices">
      <div class="notice success" th:if="${success}" th:text="${success}"></div>
      <div class="notice error" th:if="${error}" th:text="${error}"></div>
    </div>
  </body>
</html>
