services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-medical-appointment-system:local}
    container_name: medical-appointment-app
    restart: on-failure:5
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-local}
      PUBLIC_DOCS_ENABLED: ${PUBLIC_DOCS_ENABLED:-true}
      REQUIRE_SECURE_COOKIES: ${REQUIRE_SECURE_COOKIES:-false}
      EXPOSE_DIAGNOSTICS: ${EXPOSE_DIAGNOSTICS:-false}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME:-Система записи на прием}
      ORGANIZATION_PUBLIC_ADDRESS: ${ORGANIZATION_PUBLIC_ADDRESS:-Адрес медицинской организации}
      ORGANIZATION_INTERNAL_ADDRESS: ${ORGANIZATION_INTERNAL_ADDRESS:-Внутренний контур медицинской организации}
      DEFAULT_APPOINTMENT_DURATION_MINUTES: ${DEFAULT_APPOINTMENT_DURATION_MINUTES:-30}
      DEFAULT_WORK_START: ${DEFAULT_WORK_START:-09:00}
      DEFAULT_WORK_END: ${DEFAULT_WORK_END:-17:00}
      DEFAULT_BREAK_START: ${DEFAULT_BREAK_START:-13:00}
      DEFAULT_BREAK_END: ${DEFAULT_BREAK_END:-14:00}
      IDENTITY_MODE: ${IDENTITY_MODE:-LOCAL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      APP_INTERNAL_URL: ${APP_INTERNAL_URL:-http://localhost:8080}
      APP_AUTH_URL: ${APP_AUTH_URL:-http://localhost:8081}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/medical_appointment}
      DB_USERNAME: ${DB_USERNAME:-medical_appointment}
      DB_PASSWORD: ${DB_PASSWORD:-medical_appointment}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://localhost:8081/realms/medical-appointment}
      OAUTH2_PUBLIC_CLIENT_ID: ${OAUTH2_PUBLIC_CLIENT_ID:-medical-appointment-public}
      OAUTH2_INTERNAL_CLIENT_ID: ${OAUTH2_INTERNAL_CLIENT_ID:-medical-appointment-internal}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/api/health | grep -q UP",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:18-alpine
    container_name: medical-appointment-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_appointment}
      POSTGRES_USER: ${POSTGRES_USER:-medical_appointment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medical_appointment}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.6.3}
    container_name: medical-appointment-keycloak
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
          mkdir -p /opt/keycloak/data/import
          sed \
            -e "s|__APP_PUBLIC_URL__|$${APP_PUBLIC_URL}|g" \
            -e "s|__APP_INTERNAL_URL__|$${APP_INTERNAL_URL}|g" \
            -e "s|__APP_AUTH_URL__|$${APP_AUTH_URL}|g" \
            /opt/keycloak/realm-template/medical-appointment-realm.json \
            > /opt/keycloak/data/import/medical-appointment-realm.json
          exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-true}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-xforwarded}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://auth.localhost:8080}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://public.localhost:8080}
      APP_INTERNAL_URL: ${APP_INTERNAL_URL:-http://internal.localhost:8080}
      APP_AUTH_URL: ${APP_AUTH_URL:-http://auth.localhost:8080}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker/keycloak/realm:/opt/keycloak/realm-template:ro
    networks:
      default:
        aliases:
          - ${AUTH_HOST:-auth.localhost}

volumes:
  postgres-data:
  keycloak-data:
